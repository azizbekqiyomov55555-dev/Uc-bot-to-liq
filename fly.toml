# fly.toml app configuration file

app = 'uc-bot-to-liq'
primary_region = 'fra'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]

[env]
  DB_PATH = '/data/bot_database.db'
  TZ = 'Asia/Tashkent'

[processes]
  app = 'python main.py'

[[mounts]]
  source = 'botdata'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

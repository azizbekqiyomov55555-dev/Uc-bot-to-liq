# fly.toml app configuration file generated for uc-bot-to-liq on 2026-04-30T10:11:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'uc-bot-to-liq'
primary_region = 'fra'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]

[env]
  DB_PATH = '/data/bot_database.db'
  TZ = 'Asia/Tashkent'

[processes]
  app = 'python main.py'

[[mounts]]
  source = 'botdata'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
